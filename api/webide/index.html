<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T++ Web IDE</title>
  <style>
    :root {
      --bg: #f6f8f4;
      --panel: #ffffff;
      --ink: #1f2d2f;
      --muted: #5f6f70;
      --accent: #1f8a70;
      --accent-2: #184e77;
      --border: #dce5df;
      --danger: #b42318;
      --ok: #067647;
      --mono: "JetBrains Mono", "Consolas", monospace;
      --sans: "Segoe UI", "Avenir", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, #d9efe7 0, transparent 40%),
        radial-gradient(circle at 90% 100%, #d8e7f4 0, transparent 42%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(100%, 1080px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(16, 24, 40, 0.12);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, rgba(31, 138, 112, 0.1), rgba(24, 78, 119, 0.06));
    }

    .title {
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .title small {
      color: var(--muted);
      font-weight: 500;
      margin-left: 8px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select, button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      font-weight: 600;
    }

    .content {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      min-height: 560px;
    }

    .pane {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .pane + .pane {
      border-left: 1px solid var(--border);
    }

    .pane h3 {
      margin: 0;
      padding: 12px 14px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: #fafcfb;
    }

    textarea,
    pre {
      margin: 0;
      padding: 16px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.5;
      border: none;
      outline: none;
      width: 100%;
      height: 100%;
      background: transparent;
      color: var(--ink);
    }

    textarea {
      resize: none;
    }

    pre {
      white-space: pre-wrap;
      overflow: auto;
      background: #fcfefd;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: #fafcfb;
      color: var(--muted);
      font-size: 13px;
    }

    .ok { color: var(--ok); font-weight: 600; }
    .err { color: var(--danger); font-weight: 600; }

    @media (max-width: 920px) {
      .content {
        grid-template-columns: 1fr;
      }

      .pane + .pane {
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">T++ Web IDE <small>JSON API Runtime</small></div>
      <div class="controls">
        <select id="mode">
          <option value="run" selected>Run</option>
          <option value="test">Test</option>
        </select>
        <button id="sample">Load Sample</button>
        <button id="run" class="primary">Run Code</button>
      </div>
    </div>

    <div class="content">
      <section class="pane">
        <h3>Editor</h3>
        <textarea id="source">let x be 5
increase x by 10
say "x is" then x</textarea>
      </section>
      <section class="pane">
        <h3>Output</h3>
        <pre id="output">Ready.</pre>
      </section>
    </div>

    <div class="status">
      <span id="status">Idle</span>
      <span>Endpoint: POST /run</span>
    </div>
  </div>

  <script>
    const sourceEl = document.getElementById("source");
    const outputEl = document.getElementById("output");
    const modeEl = document.getElementById("mode");
    const statusEl = document.getElementById("status");

    async function runCode() {
      statusEl.textContent = "Running...";
      statusEl.className = "";
      outputEl.textContent = "";

      const payload = {
        mode: modeEl.value,
        source: sourceEl.value,
      };

      try {
        const res = await fetch("/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        if (!res.ok || !data.ok) {
          statusEl.textContent = "Error";
          statusEl.className = "err";
          outputEl.textContent = data.error || JSON.stringify(data, null, 2);
          return;
        }

        statusEl.textContent = "Success";
        statusEl.className = "ok";

        const parts = [];
        if (data.stdout) {
          parts.push(data.stdout.trimEnd());
        }
        if (data.summary) {
          parts.push(`Tests: ${data.summary.passed} passed, ${data.summary.failed} failed`);
        }
        if (data.tests) {
          parts.push(JSON.stringify(data.tests, null, 2));
        }
        outputEl.textContent = parts.join("\n\n") || "(no output)";
      } catch (err) {
        statusEl.textContent = "Connection Error";
        statusEl.className = "err";
        outputEl.textContent = String(err);
      }
    }

    document.getElementById("run").addEventListener("click", runCode);

    document.getElementById("sample").addEventListener("click", () => {
      sourceEl.value = `suite "sample suite":
    test "addition":
        expect 2 plus 3 to be 5

let name be "T++"
say "hello" then name`;
    });
  </script>
</body>
</html>
